# Builds the package and uploads it to PyPI when a GitHub release is created.
# Uses PyPI Trusted Publishing (OIDC) — no API token / secret required.
# Configure the trusted publisher at https://pypi.org/manage/account/publishing/
#   owner:    doronz88
#   repo:     tunneldup
#   workflow: python-publish.yml

name: Upload Python Package

on:
  release:
    types: [ created ]

jobs:
  deploy:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
